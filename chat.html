<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <title>Чат — Connect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #444E5A;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

   
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #E1D9CC;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.3s;
        }
        .back-btn:hover { opacity: 0.8; }

   
        .chat-card {
            background: #E1D9CC;
            border-radius: 28px;
            padding: 40px;
            display: flex;
            width: 80%;
            max-width: 1000px;
            height: 70vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

       
        .chat-sidebar {
            width: 300px;
            border-right: 2px solid #b3aba0;
            padding-right: 20px;
        }

        .chat-sidebar h3 { font-weight: 800; color: #444E5A; margin-top: 0; }
        .chat-contact { padding: 15px; background: rgba(0,0,0,0.05); border-radius: 12px; font-weight: 600; cursor: pointer; }

      
        .chat-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding-left: 30px;
        }

        .chat-header { font-weight: 900; font-size: 24px; color: #444E5A; margin-bottom: 20px; }

        .messages-area {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 10px;
        }

     
        .message { padding: 12px 20px; border-radius: 20px; max-width: 60%; font-weight: 500; }
        .incoming { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 4px; }
        .outgoing { align-self: flex-end; background: #444E5A; color: #fff; border-bottom-right-radius: 4px; }

       
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding-top: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border: 2px solid #b3aba0;
            border-radius: 12px;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }

        .btn-send {
            background-color: #444E5A;
            color: #fff;
            border: none;
            padding: 0 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
        }
        .btn-send:hover { background-color: #333; }
    </style>
</head>
<body>

    <a href="profile.html" class="back-btn">&larr; Назад к профилю</a>

    <div class="chat-card">
        <aside class="chat-sidebar">
            <h3>Диалоги</h3>
            <div class="chat-contact">Максим Волков</div>
        </aside>

        <main class="chat-main">
            <div class="chat-header">Максим Волков</div>
            
            <div class="messages-area" id="chat-messages">
                <div class="message incoming">Привет! Я готов обсудить ваш проект.</div>
                <div class="message outgoing">Здравствуйте, Максим! Мне очень нравится ваше портфолио.</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Введите сообщение...">
                <button class="btn-send" id="send-btn">Отправить</button>
            </div>
        </main>
    </div>

    <script>
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesArea = document.getElementById('chat-messages');

        function sendMessage() {
            const text = input.value.trim();
            if (text === "") return;

            const userMsg = document.createElement('div');
            userMsg.className = 'message outgoing';
            userMsg.textContent = text;
            messagesArea.appendChild(userMsg);
            
            input.value = ""; 
            messagesArea.scrollTop = messagesArea.scrollHeight;

            setTimeout(() => {
                const botMsg = document.createElement('div');
                botMsg.className = 'message incoming';
                botMsg.textContent = "Интересная задача! Давайте обсудим детали в Zoom?";
                messagesArea.appendChild(botMsg);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 1500);
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
