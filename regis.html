<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация WeDo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    list-style: none;
}

body {
    background-color: #E1D9CC;
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-y: auto;
}

.container {
    width: 100%;
    max-width: 800px; /* Немного сузили для компактности */
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.logo {
    align-self: flex-start;
    margin-bottom: 10px;
}

.logo-img {
    width: 180px; /* Чуть уменьшили лого */
    height: auto;
    object-fit: contain;
}

h1 {
    font-weight: 900;
    font-size: 60px; /* Уменьшили для вхождения в экран */
    color: #444E5A;
    text-align: center;
    line-height: 1;
    letter-spacing: -2px;
}

.form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 20px; /* Отступы между полями */
}

.input-error {
    border-color: #ff4d4d !important;
    box-shadow: 0 0 10px rgba(255, 77, 77, 0.2);
}

input.input-error {
    border: 4px solid #ff4d4d !important;
    box-shadow: 0 0 10px rgba(255, 77, 77, 0.4) !important;
}

.error-message {
    color: #ff4d4d;
    font-size: 14px;
    margin-top: -10px; /* подтянем текст поближе к полю */
    margin-left: 15px;
    display: block;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.input-group label {
    font-weight: 600;
    font-size: 20px; /* Уменьшили размер заголовков полей */
    color: #000000;
}

.input-group input {
    width: 100%;
    height: 70px; /* Оптимальная высота */
    background: transparent;
    border: 4px solid #444E5A;
    border-radius: 35px;
    padding: 0 30px;
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    outline: none;
}

.password-wrapper {
    position: relative;
    width: 100%;
}

.toggle-password {
    position: absolute;
    right: 25px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    color: #444E5A;
}

.register-btn {
    width: 100%;
    height: 70px;
    background: #444E5A;
    border: none;
    border-radius: 35px;
    font-size: 24px;
    font-weight: 800;
    color: #FFFFFF;
    cursor: pointer;
    margin-top: 10px;
}

.role-selector > label {
    font-size: 20px;
    margin-bottom: 10px;
    display: block;
    list-style: none !important;
    padding: 0 !important;
    margin: 0 !important;
    background-image: none !important;
}

input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0;
    height: 0;
}

.role-options {
    display: flex;
    gap: 20px;
    list-style: none;
    padding: 0;
    margin: 0;
}

.role-options, 
.role-options label, 
.role-options input, 
.role-options span {
    list-style: none !important;
    list-style-type: none !important;
    background-image: none !important;
    padding: 0 !important;
    margin: 0 !important;
    outline: none !important;
    border-image: none !important;
}


.role-card {
    flex: 1;
    height: 70px;
    border: 4px solid #444E5A;
    border-radius: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    font-weight: 700;
}

.role-card:has(input:checked) {
    background-color: #444E5A;
    color: #FFFFFF;
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
}

.login-link {
    display: flex;
    justify-content: center;
    gap: 10px;
    font-size: 20px;
    margin-bottom: 20px;
    color: #444E5A;
}
.login-link a {
    color: #444E5A;
    font-weight: 700;
    text-decoration: none;
}
.checkbox-group {
    display: flex;
    align-items: center;
    justify-content: center; 
    gap: 10px;
    font-size: 16px;
    text-align: center;
    margin: 10px 0; 
}

.link {
    color: #C89D58;
    text-decoration: none;
    position: relative;
    transition: color 0.3s ease;
}
.link::after {
    content: '';
    position: absolute;
    width: 100%;
    transform: scaleX(0); 
    height: 3px;
    bottom: -2px;
    left: 0;
    background-color: currentColor; 
    transform-origin: bottom right;
    transition: transform 0.25s ease-out;
}
.link:hover::after {
    transform: scaleX(1); 
    transform-origin: bottom left;
}
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <img src="asset/logo.png" alt="WeDo Logo" class="logo-img">
        </div>

        <h1>РЕГИСТРАЦИЯ</h1>

        <div class="role-selector">
            <label>Кем вы будете работать?</label>
                <div class="role-options">
            <label class="role-card">
            <input type="radio" name="role" value="freelancer" checked>
            <span>Фрилансер</span>
            </label>
            <label class="role-card">
                <input type="radio" name="role" value="customer">
                <span>Заказчик</span>
            </label>
        </div>
    </div>

    <form class="form" id="regForm" novalidate>
    <div class="input-group">
        <label>Имя и Фамилия</label>
        <input type="text" id="fullName" placeholder="Иван Иванов" required>
        <span class="error-message"></span>
    </div>

    <div class="input-group">
        <label>Электронная почта</label>
        <input type="email" placeholder="ivan@example.com" required>
        <span class="error-message"></span>
    </div>

    <div class="input-group">
        <label>Придумайте пароль</label>
        <div class="password-wrapper">
            <input type="password" id="password" class="password-field" placeholder="••••••••" required>
            <button type="button" class="toggle-password">Показать</button>
        </div>
        <span class="error-message"></span>
    </div>

    <div class="input-group">
        <label>Подтвердите пароль</label>
        <div class="password-wrapper">
            <input type="password" id="confirm-password" class="password-field" placeholder="••••••••" required>
            <button type="button" class="toggle-password">Показать</button>
        </div>
        <span class="error-message"></span>
    </div>

    <button type="submit" class="register-btn">ЗАРЕГИСТРИРОВАТЬСЯ</button>

    <div class="checkbox-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">Я соглашаюсь с условиями использования и политикой конфиденциальности</label>
    </div>
    <span class="error-message"></span>
    </form>

        <div class="login-link">
            <span class="text">У меня уже есть аккаунт.</span>
            <a href="loading.html" class="link">Войти</a>
        </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('regForm');
        const toggleButtons = document.querySelectorAll('.toggle-password');


        toggleButtons.forEach(button => {
            button.addEventListener('click', () => {
                const passwordInput = button.previousElementSibling;
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    button.textContent = 'Скрыть';
                } else {
                    passwordInput.type = 'password';
                    button.textContent = 'Показать';
                }
            });
        });

        
        form.addEventListener('submit', (e) => {
            const fullName = document.getElementById('fullName');
            const password = document.getElementById('password');
            const confirmPassword = document.getElementById('confirm-password');
            const inputs = form.querySelectorAll('input');

            inputs.forEach(input => {
                input.classList.remove('input-error');
                const group = input.closest('.input-group') || input.closest('.checkbox-group') || input.parentElement;
                const errorSpan = group.querySelector('.error-message');
                if (errorSpan) errorSpan.textContent = '';
            });

            const nameRegex = /^[a-zA-Zа-яёА-ЯЁ\s]+$/;
            if (!nameRegex.test(fullName.value)) {
                e.preventDefault();
                fullName.classList.add('input-error');
                const group = fullName.closest('.input-group');
                const errorSpan = group.querySelector('.error-message');
                if (errorSpan) errorSpan.textContent = 'Введите корректное имя (только буквы)';
                return;
            }

            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                [password, confirmPassword].forEach(input => {
                    input.classList.add('input-error');
                    const group = input.closest('.input-group');
                    const errorSpan = group.querySelector('.error-message');
                    if (errorSpan) errorSpan.textContent = 'Пароли не совпадают';
                });
                return;
            }

            if (!form.checkValidity()) {
                e.preventDefault();

                inputs.forEach(input => {
                    if (!input.checkValidity()) {
                        input.classList.add('input-error');
                        const group = input.closest('.input-group') || input.closest('.checkbox-group') || input.parentElement;
                        const errorSpan = group.querySelector('.error-message');
                        if (errorSpan) {
                            const label = group.querySelector('label')?.textContent || "поле";
                            errorSpan.textContent = `Заполните: ${label}`;
                        }
                    }
                });
                return;
            }

            e.preventDefault();
            const selectedRole = document.querySelector('input[name="role"]:checked').value;
            sessionStorage.setItem('userRole', selectedRole);
            window.location.href = 'loading.html';
        });
    });
    </script>
</body>
</html>
